<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#05070A;}
  body{
    font-family:'Inter',sans-serif; color:#E9F6F5;

    width:130px; height:170px; border:1px solid rgba(0,229,216,0.3);

    font-family:'Fraunces',serif; font-size:44px; color:#00E5D8; opacity:0.5;

  p{max-width:420px; color:#7C8B8F; font-weight:300; font-size:14.5px; line-height:1.7; margin-bottom:36px;}
  a{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
    color:#05070A; background:#00E5D8; text-decoration:none; padding:12px 24px; transition:opacity 0.2s;
  }
  a:hover{opacity:0.85;}
</style>
</head>
<body>
  <div class="code">Erro 404</div>
  <div class="frame">?</div>
